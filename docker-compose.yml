version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./ml/models/saved:/app/ml/models/saved
      - ./backend/static:/app/static
    environment:
      - DEBUG=False
      - DATABASE_URL=sqlite+aiosqlite:///./deepshield.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
